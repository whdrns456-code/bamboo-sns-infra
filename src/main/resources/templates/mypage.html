<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAMBOO_NET | USER_PROFILE</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .profile-header {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 40px;
            margin-bottom: 40px;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--dark-green);
        }

        .avatar-container {
            width: 200px;
            height: 200px;
            border: 2px solid var(--primary-green);
            padding: 5px;
            background: rgba(0, 255, 65, 0.05);
            position: relative;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) brightness(0.8) contrast(1.2);
        }

        .avatar-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0, 255, 65, 0.1) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }

        .profile-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .user-nickname {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--primary-green);
        }

        .user-meta {
            font-size: 0.9rem;
            color: var(--soft-green);
            opacity: 0.8;
            margin-bottom: 20px;
        }

        .user-meta span {
            margin-right: 20px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(0, 59, 17, 0.1);
            border: 1px solid var(--dark-green);
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--primary-green);
            display: block;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .section-title {
            font-size: 1.2rem;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary-green);
        }

        .section-title::before {
            content: '>';
        }

        .profile-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-profile {
            padding: 10px 20px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
            background: transparent;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            text-transform: uppercase;
        }

        .btn-profile:hover {
            background: var(--primary-green);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--primary-green);
        }

        @media (max-width: 768px) {
            .profile-header {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .avatar-container {
                margin: 0 auto;
            }
            .profile-stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<!-- Bamboo Matrix Background -->
<canvas id="bambooCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; pointer-events: none;"></canvas>

<!-- Thymeleaf Fragment: Header -->
<div th:replace="~{fragments/header :: header}">
    <header class="terminal-nav">
        <div class="nav-container">
            <div class="logo"><a href="/" class="glitch-text" data-text="BAMBOO_NET">BAMBOO_NET</a></div>
            <nav class="nav-links">
                <a href="/" class="nav-item">/HOME</a>
                <a href="/board/write" class="nav-item">/WRITE</a>
                <a href="/mypage" class="nav-item">/MY_PAGE</a>
            </nav>
        </div>
    </header>
</div>

<main class="main-content">
    <div class="mypage-container">
        <div class="terminal-card" style="padding: 40px;">
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="avatar-container">
                    <img id="userAvatar" src="https://picsum.photos/seed/user123/400/400" alt="User Avatar" class="avatar-image" referrerPolicy="no-referrer">
                    <div class="avatar-overlay"></div>
                </div>
                <div class="profile-info">
                    <h2 id="userNickname" class="user-nickname glitch-text" data-text="root_hacker">root_hacker</h2>
                    <div class="user-meta">
                        <span id="userUid">UID: #1024</span>
                        <span>JOINED: 2026-01-15</span>
                        <span>STATUS: <span id="userStatus" style="color: var(--primary-green);">ONLINE</span></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Thymeleaf Fragment: Footer -->
<div th:replace="~{fragments/footer :: footer}">
    <footer class="terminal-footer">
        <div class="footer-container">
            <span>&copy; 2026 BAMBOO_FOREST_NETWORKS</span>
            <span>SYSTEM_READY</span>
        </div>
    </footer>
</div>

<script src="/js/main.js"></script>
</body>
</html>
