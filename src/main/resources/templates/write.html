<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAMBOO_NET | DATA_INJECTION</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .write-container {
            max-width: 800px;
            margin: 40px auto;
        }

        .injection-protocol {
            background: var(--dark-green);
            border: 1px solid var(--primary-green);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.1);
        }

        /* Editor Panel */
        .editor-panel {
            background: rgba(10, 14, 23, 0.8);
            padding: 30px;
            position: relative;
        }

        .editor-panel::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.02));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .write-form {
            display: flex;
            flex-direction: column;
            gap: 25px;
            position: relative;
            z-index: 5;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            margin-bottom: 8px;
            color: var(--primary-green);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group input,
        .input-group select,
        .input-group textarea {
            width: 100%;
            background: rgba(0, 59, 17, 0.05);
            border: 1px solid var(--dark-green);
            padding: 15px;
            color: var(--primary-green);
            font-family: var(--font-mono);
            outline: none;
            transition: 0.3s;
        }

        .input-group textarea {
            min-height: 350px;
            border-left: 3px solid var(--primary-green);
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: var(--primary-green);
            background: rgba(0, 59, 17, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
        }

        .image-upload-zone {
            border: 1px dashed var(--dark-green);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(0, 59, 17, 0.02);
        }

        .image-upload-zone:hover {
            border-color: var(--primary-green);
            background: rgba(0, 59, 17, 0.05);
        }

        .preview-box {
            margin-top: 15px;
            display: none;
            border: 1px solid var(--primary-green);
            padding: 5px;
            background: #000;
        }

        #imagePreview {
            max-width: 100%;
            max-height: 300px;
            display: block;
            margin: 0 auto;
        }

        .write-actions {
            display: flex;
            justify-content: flex-end;
            gap: 20px;
            margin-top: 10px;
        }

        .btn-injection {
            padding: 12px 40px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 1px solid var(--primary-green);
            background: transparent;
            color: var(--primary-green);
        }

        .btn-injection:hover {
            background: var(--primary-green);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--primary-green);
        }

        .btn-abort {
            border-color: var(--error-red);
            color: var(--error-red);
        }

        .btn-abort:hover {
            background: var(--error-red);
            color: white;
            box-shadow: 0 0 20px var(--error-red);
        }
    </style>
</head>
<body>

<canvas id="bambooCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; pointer-events: none;"></canvas>

<div th:replace="~{fragments/header :: header}">
    <header class="terminal-nav">
        <div class="nav-container">
            <div class="logo"><a href="/" class="glitch-text" data-text="BAMBOO_NET">BAMBOO_NET</a></div>
            <nav class="nav-links">
                <a href="/" class="nav-item">/HOME</a>
                <a href="/board/write" class="nav-item">/WRITE</a>
            </nav>
        </div>
    </header>
</div>

<main class="main-content">
    <div class="write-container">
        <div class="injection-protocol">
            <!-- Editor Panel -->
            <section class="editor-panel">
                <form class="write-form" action="/board/write" method="POST" th:action="@{/board/write}" enctype="multipart/form-data">
                    <div style="display: grid; grid-template-columns: 1fr 200px; gap: 20px;">
                        <div class="input-group">
                            <label for="title">SUBJECT_IDENTIFIER</label>
                            <input type="text" id="title" name="title" required placeholder="Enter transmission subject..." autocomplete="off">
                        </div>
                        <div class="input-group">
                            <label for="category">PROTOCOL_TYPE</label>
                            <select id="category" name="category">
                                <option value="GENERAL">/GENERAL</option>
                                <option value="INFOSEC">/INFOSEC</option>
                                <option value="QUESTION">/QUESTION</option>
                                <option value="NOTICE">/NOTICE</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>VISUAL_DATA_ATTACHMENT</label>
                        <label for="imageInput" class="image-upload-zone" id="dropZone">
                            <span>[+] DRAG_OR_CLICK_TO_ATTACH_IMAGE</span>
                            <input type="file" id="imageInput" name="imageFile" accept="image/*" style="display: none;">
                        </label>
                        <div id="previewBox" class="preview-box">
                            <img id="imagePreview" src="" alt="Preview">
                            <div id="removeImage" style="color: var(--error-red); font-size: 0.7rem; margin-top: 10px; cursor: pointer; text-align: center;">_PURGE_ATTACHMENT</div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="content">DATA_PAYLOAD_CONTENT</label>
                        <textarea id="content" name="content" required placeholder="Inject your message here..."></textarea>
                    </div>

                    <div class="write-actions">
                        <button type="button" class="btn-injection btn-abort" onclick="history.back()">_ABORT</button>
                        <button type="submit" class="btn-injection">_EXECUTE_INJECTION</button>
                    </div>
                </form>
            </section>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: footer}">
    <footer class="terminal-footer">
        <div class="footer-container">
            <span>&copy; 2026 BAMBOO_FOREST_NETWORKS</span>
            <span>SYSTEM_READY</span>
        </div>
    </footer>
</div>

<script src="/js/main.js"></script>

<script>
    const imageInput = document.getElementById('imageInput');
    const imagePreview = document.getElementById('imagePreview');
    const previewBox = document.getElementById('previewBox');
    const removeImage = document.getElementById('removeImage');

    // 이미지 미리보기 로직 (기존 유지)
    imageInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                previewBox.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    removeImage.addEventListener('click', function() {
        imageInput.value = '';
        imagePreview.src = '';
        previewBox.style.display = 'none';
    });

    // 게시글 저장 로직 (secureFetch 적용)
    document.querySelector('.write-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const formData = new FormData(this);

        try {
            // [수정] fetch -> secureFetch 사용
            // FormData를 보낼 때는 'Content-Type' 헤더를 직접 설정하지 마세요.
            // 브라우저가 자동으로 'multipart/form-data; boundary=...'를 설정해줍니다.
            const response = await secureFetch('/board/save', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                window.location.href = '/main';
            } else {
                const errorMsg = await response.text();
                // showSystemModal 함수명이 위에서 정의한 것과 맞는지 확인 (showSystemMessage일 수도 있음)
                showSystemModal('[SYSTEM_ERROR]', 'INJECTION_FAILED: ' + errorMsg);
            }
        } catch (error) {
            console.error('SAVE_ERR:', error);
            showSystemModal('[CRITICAL_FAILURE]', 'CONNECTION_LOST: CHECK_NETWORK_STATUS');
        }
    });

    // 시스템 모달 로직 (기존 유지)
    function showSystemModal(title, message, callback) {
        const modal = document.getElementById('systemModal');
        const tElement = document.getElementById('modalTitle');
        const mElement = document.getElementById('modalMessage');

        if (modal && tElement && mElement) {
            tElement.innerText = title;
            mElement.innerText = message;
            modal.style.display = 'flex';
        }

        window.closeModal = function() {
            modal.style.display = 'none';
            if (callback) callback();
        };
    }
</script>

</body>
</html>
