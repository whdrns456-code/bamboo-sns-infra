<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <title>BAMBOO_NET | IDENTITY_REGISTRATION</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>

        .main-content {
            min-height: calc(100vh - 160px); 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .signup-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }


        .signup-container {
            max-width: 500px;
            margin: 40px auto;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 8px;
            color: var(--soft-green);
            letter-spacing: 1px;
        }
        .input-group input {
            width: 100%;
            background: rgba(0, 59, 17, 0.1);
            border: 1px solid var(--dark-green);
            padding: 12px;
            color: var(--primary-green);
            font-family: var(--font-mono);
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: var(--primary-green);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
            background: rgba(0, 59, 17, 0.2);
        }
        .input-with-btn {
            display: flex;
            gap: 10px;
        }
        .input-with-btn input {
            flex: 1;
        }
        .btn-check {
            background: transparent;
            border: 1px solid var(--dark-green);
            color: var(--soft-green);
            padding: 0 15px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
            white-space: nowrap;
        }
        .btn-check:hover {
            border-color: var(--primary-green);
            color: var(--primary-green);
            box-shadow: 0 0 5px var(--primary-green);
        }
        .btn-submit {
            width: 100%;
            background: transparent;
            border: 1px solid var(--primary-green);
            color: var(--primary-green);
            padding: 15px;
            font-family: var(--font-mono);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .btn-submit:hover {
            background: var(--primary-green);
            color: var(--bg-color);
            box-shadow: 0 0 20px var(--primary-green);
        }
        .form-footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.8rem;
        }
        .form-footer a {
            color: var(--primary-green);
            text-decoration: none;
        }
        .form-footer a:hover {
            text-decoration: underline;
        }

        /* Password Strength Meter */
        .strength-meter {
            height: 4px;
            width: 100%;
            background: rgba(0, 59, 17, 0.2);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        .strength-text {
            font-size: 0.65rem;
            margin-top: 5px;
            display: block;
            text-align: right;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .strength-0 .strength-bar { width: 5%; background-color: var(--error-red); }
        .strength-1 .strength-bar { width: 25%; background-color: #ff4d4d; }
        .strength-2 .strength-bar { width: 50%; background-color: #ffa500; }
        .strength-3 .strength-bar { width: 75%; background-color: #ccff33; }
        .strength-4 .strength-bar { width: 100%; background-color: var(--primary-green); box-shadow: 0 0 10px var(--primary-green); }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }
    </style>
</head>
<body>
<!-- Bamboo Matrix Background -->
<canvas id="bambooCanvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.2; pointer-events: none;"></canvas>

<!-- Thymeleaf Fragment: Header -->
<div th:replace="~{fragments/header :: header}">
    <header class="terminal-nav">
        <div class="nav-container">
            <div class="logo"><a href="/" class="glitch-text" data-text="BAMBOO_NET">BAMBOO_NET</a></div>
            <nav class="nav-links">
                <a href="/" class="nav-item">/HOME</a>
                <a href="/board/write" class="nav-item">/WRITE</a>
                <a href="/signup" class="nav-item">/SIGNUP</a>
            </nav>
        </div>
    </header>
</div>

<main class="main-content">
    <div class="signup-container">
        <div class="terminal-card">
            <h3 class="card-title">IDENTITY_REGISTRATION_PROTOCOL</h3>
            <p class="terminal-text" style="font-size: 0.7rem; margin-bottom: 30px; opacity: 0.7;">
                [SYSTEM] PLEASE PROVIDE VALID CREDENTIALS FOR ENCRYPTION...
            </p>

            <form id="signupForm">
                <div class="input-group">
                    <label for="username">USER_IDENTIFIER (ID)</label>
                    <div class="input-with-btn">
                        <input type="text" id="username" name="username" required placeholder="Enter unique ID..." autocomplete="off">
                        <button type="button" class="btn-check" id="checkIdBtn">CHECK_AVAILABILITY</button>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="password">ACCESS_KEY (PW)</label>
                        <input type="password" id="password" name="password" required placeholder="Min 8 chars...">
                        <div id="strengthMeter" class="strength-meter">
                            <div id="strengthBar" class="strength-bar"></div>
                        </div>
                        <span id="strengthText" class="strength-text">STRENGTH: NONE</span>
                    </div>
                    <div class="input-group">
                        <label for="confirmPassword">VERIFY_KEY</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Repeat key...">
                    </div>
                </div>

                <div class="input-group">
                    <label for="nickname">ALIAS (NICKNAME)</label>
                    <div class="input-with-btn">
                        <input type="text" id="nickname" name="nickname" required placeholder="Enter public alias...">
                        <button type="button" class="btn-check" id="checkNicknameBtn">CHECK_AVAILABILITY</button>
                    </div>
                </div>

                <button type="submit" class="btn-submit" style="margin-top: 20px;">EXECUTE_REGISTRATION</button>
            </form>

            <div class="form-footer">
                ALREADY_HAVE_IDENTITY? <a href="/login">_INITIATE_LOGIN</a>
            </div>
        </div>
    </div>
</main>

<!-- Thymeleaf Fragment: Footer -->
<div th:replace="~{fragments/footer :: footer}">
    <footer class="terminal-footer">
        <div class="footer-container">
            <span>&copy; 2026 BAMBOO_FOREST_NETWORKS</span>
            <span>SYSTEM_READY</span>
        </div>
    </footer>
</div>

<script src="/js/main.js"></script>

const signupForm = document.getElementById('signupForm');

signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const nickname = document.getElementById('nickname').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
        showSystemMessage('[ERROR] ACCESS_KEYS_DO_NOT_MATCH', true);
        return;
    }

    const signupData = {
        username: username,
        password: password,
        confirmPassword: confirmPassword,
        nickname: nickname
    };

    try {
        // [수정] fetch -> secureFetch 교체
        // POST 요청이므로 헤더에 자동으로 CSRF 토큰이 포함됩니다.
        const response = await secureFetch('/signup', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(signupData)
        });

        if (response.ok) {
            showSystemMessage('[SUCCESS] IDENTITY_REGISTRATION_COMPLETE');
            setTimeout(() => {
                window.location.href = '/login';
            }, 1500);
        } else {
            const errorData = await response.json();
            showSystemMessage(`[ERROR] ${errorData.message || 'REGISTRATION_FAILED'}`, true);
        }
    } catch (error) {
        console.error('Fetch Error:', error);
        showSystemMessage('[CRITICAL_ERROR] NETWORK_PROTOCOL_FAILURE', true);
    }
});

// 공통 통신 함수 (아이디/닉네임 중복 체크)
async function checkAvailability(type, value, btnElement) {
    if (!value) {
        showSystemMessage(`[SYSTEM] PLEASE_ENTER_${type.toUpperCase()}_FIRST`);
        return;
    }

    btnElement.innerText = 'CHECKING...';
    btnElement.disabled = true;

    try {
        // [수정] fetch -> secureFetch 교체
        // GET 요청이므로 토큰 검사는 건너뛰지만, 통일성을 위해 사용합니다.
        const response = await secureFetch(`/${type}?${type}=${encodeURIComponent(value)}`);
        const result = await response.json();

        if (result.available) {
            showSystemMessage(`[SUCCESS] ${type.toUpperCase()}_IS_AVAILABLE`);
            btnElement.innerText = 'AVAILABLE';
            btnElement.style.borderColor = 'var(--primary-green)';
            btnElement.style.color = 'var(--primary-green)';
        } else {
            showSystemMessage(`[ERROR] ${type.toUpperCase()}_ALREADY_IN_USE`);
            btnElement.innerText = 'UNAVAILABLE';
            btnElement.style.borderColor = 'var(--error-red)';
            btnElement.style.color = 'var(--error-red)';
        }
    } catch (error) {
        console.error(`${type} Check Error:`, error);
        showSystemMessage('[CRITICAL_ERROR] VALIDATION_PROTOCOL_FAILED', true);
    } finally {
        btnElement.disabled = false;
    }
}


    // 아이디 체크 버튼 이벤트
    document.getElementById('checkIdBtn').addEventListener('click', function() {
        const username = document.getElementById('username').value;
        checkAvailability('username', username, this);
    });

    // 닉네임 체크 버튼 이벤트
    document.getElementById('checkNicknameBtn').addEventListener('click', function() {
        const nickname = document.getElementById('nickname').value;
        checkAvailability('nickname', nickname, this);
    });

    const passwordInput = document.getElementById('password');
    const strengthMeter = document.getElementById('strengthMeter');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');

    passwordInput.addEventListener('input', () => {
        const val = passwordInput.value;
        let strength = 0;

        if (val.length > 0) {
            if (/[a-z]/.test(val)) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;
        }

        strengthMeter.className = 'strength-meter strength-' + strength;

        const labels = [
            'STRENGTH: NONE',
            'STRENGTH: WEAK',
            'STRENGTH: MEDIUM',
            'STRENGTH: STRONG',
            'STRENGTH: VERY_STRONG'
        ];
        strengthText.innerText = labels[strength];


        if (strength === 4) {
            strengthText.style.color = 'var(--primary-green)';
            strengthText.style.textShadow = '0 0 5px var(--primary-green)';
        } else if (strength === 0 && val.length > 0) {
            strengthText.style.color = 'var(--error-red)';
            strengthText.style.textShadow = 'none';
        } else {
            strengthText.style.color = 'var(--soft-green)';
            strengthText.style.textShadow = 'none';
        }
    });
</script>
</body>
