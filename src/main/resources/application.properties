spring.application.name=bamboo-forest
# DB 연결
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://10.10.10.20:3306/bamboo_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234

# MyBatis 설정
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.example.bambooforest.model
mybatis.configuration.map-underscore-to-camel-case=true
# 자바스크립트를 통한 쿠키 탈취 방지
server.servlet.session.cookie.http-only=true

# 세션 유지 시간 설정 (30분)
server.servlet.session.timeout=30m

spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB
# [SECURITY_ENHANCEMENT]

# HTTPS를 사용한다면 true로 변경
# server.servlet.session.cookie.secure=false

# 동일 출처 정책 강화 (CSRF 방어 보조)
# server.servlet.session.cookie.same-site=strict

# 로컬 개발용 (Windows 예시: C 드라이브 아래에 폴더를 만드세요)

# 호스트 PC 테스트용
# file.upload-dir=C:/bamboo_uploads/

# 나중에 VM/Docker 파일 업로드
 file.upload-dir=/app/uploads/

 logging.level.org.apache.coyote.http11.Http11Processor=DEBUG
 logging.level.org.springframework.web=DEBUG

# [SECURITY_ENHANCEMENT]
# 1. 프록시(WAF/ngrok)가 보내는 X-Forwarded-* 헤더를 신뢰함 (가장 중요!)

#  로컬 테스트 주석 처리 [배포 전 확인하자!]
 server.forward-headers-strategy=native

# 2. HTTPS 환경이므로 쿠키 보안 속성을 활성화 (주석 해제 및 수정)
server.servlet.session.cookie.secure=false
# 3. ngrok 도메인과 세션 유지를 위해 SameSite 설정을 None으로 변경

# (None으로 설정할 때는 반드시 Secure가 true여야 브라우저가 받아줍니다)
server.servlet.session.cookie.same-site=lax
# 4. (추가) 프록시 환경에서 리다이렉트 주소가 http로 꼬이는 걸 방지

# 배포 전 확인[확인하자!]
server.tomcat.use-relative-redirects=true

# 3. [추가 추천] 프록시 주소 신뢰 설정 (Tomcat 내부 설정 강화)
server.tomcat.remoteip.remote-ip-header=X-Forwarded-For
server.tomcat.remoteip.protocol-header=X-Forwarded-Proto

# 최신 방식: 톰캣 전용 설정으로 변경 (64KB로 넉넉하게!)
server.tomcat.max-http-form-post-size=64KB
# 연결 유지 설정 (기존과 동일)
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=15000

spring.session.store-type=redis
spring.data.redis.host=10.10.10.20
spring.data.redis.port=6379
spring.data.redis.password=1597

# spring.session.store-type=none