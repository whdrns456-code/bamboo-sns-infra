spring.application.name=bamboo-forest

# DB 연결
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://192.168.0.254:3306/bamboo_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234

# MyBatis 설정
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.example.bambooforest.model
mybatis.configuration.map-underscore-to-camel-case=true
# 자바스크립트를 통한 쿠키 탈취 방지
server.servlet.session.cookie.http-only=true

# 세션 유지 시간 설정 (30분)
server.servlet.session.timeout=30m

spring.servlet.multipart.max-file-size=3MB
spring.servlet.multipart.max-request-size=3MB
# [SECURITY_ENHANCEMENT]

# HTTPS를 사용한다면 true로 변경
# server.servlet.session.cookie.secure=false

# 동일 출처 정책 강화 (CSRF 방어 보조)
# server.servlet.session.cookie.same-site=strict

# 로컬 개발용 (Windows 예시: C 드라이브 아래에 폴더를 만드세요)
# file.upload-dir=C:/bamboo_uploads/

# 나중에 VM/Docker로 갈 때는 이 줄만 바꾸면 됩니다.
file.upload-dir=/app/uploads/

logging.level.org.apache.coyote.http11.Http11Processor=DEBUG
logging.level.org.springframework.web=DEBUG